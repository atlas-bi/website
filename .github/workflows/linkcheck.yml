name: 🔗 Linkcheck
on: [push]
jobs:
  linkcheck:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
    - name: 💾 Checkout
      uses: actions/checkout@v6

    - name: 🧰 Setup pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
      with:
        version: 9.15.4

    - name: 🧰 Setup pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
      with:
        version: 9.15.4

    - name: ⎔ Setup node
      uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: 📥 Download deps
      run: pnpm install --frozen-lockfile

    - name: 🏗️ Build
      run: pnpm run build:ci

    - name: 🔗 Linkcheck
      uses: untitaker/hyperlink@a3c5f96830515ee0621f21c7b7579f20b9faddcc
      with:
        args: _site/