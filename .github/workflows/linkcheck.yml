name: 🔗 Linkcheck
on: [push]
jobs:
  linkcheck:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
    - name: 💾 Checkout
      uses: actions/checkout@v6

    - name: ⎔ Setup node
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: 📥 Download deps
      uses: bahmutov/npm-install@2be24215e83689aa4e78feeca4203604174019dc
      with:
        useLockFile: false

    - name: 🏗️ Build
      run: npm run build:ci

    - name: 🔗 Linkcheck
      uses: untitaker/hyperlink@a3c5f96830515ee0621f21c7b7579f20b9faddcc
      with:
        args: _site/